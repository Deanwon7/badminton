<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arcade Badminton Strike - Version 2</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Impact', 'Arial Black', sans-serif;
            overflow: hidden;
        }

        /* [1] 캐릭터 선택 화면 */
        #menu-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.3);
            border: 4px solid #00f2fe;
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        #menu-screen h1 {
            color: #00f2fe;
            font-size: 32px;
            margin: 0 0 10px 0;
            text-shadow: 0 0 10px #00f2fe;
            letter-spacing: 1px;
        }
        #menu-screen p {
            color: #94a3b8;
            font-size: 14px;
            margin: 0 0 30px 0;
            font-family: 'Malgun Gothic', sans-serif;
        }
        .btn-container {
            display: flex;
            gap: 20px;
            width: 100%;
        }
        .select-btn {
            flex: 1;
            background: #334155;
            border: 3px solid #64748b;
            border-radius: 16px;
            padding: 20px 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .select-btn:active {
            transform: scale(0.92);
        }
        #btn-jiyoon { border-color: #f43f5e; box-shadow: 0 0 10px rgba(244,63,94,0.2); }
        #btn-jihoon { border-color: #3b82f6; box-shadow: 0 0 10px rgba(59,130,246,0.2); }
        .select-btn .emoji { font-size: 50px; margin-bottom: 8px; }
        .select-btn .name { color: #fff; font-size: 20px; font-weight: bold; font-family: 'Malgun Gothic'; }

        /* [2] 게임 화면 래퍼 */
        #game-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 720px;
            height: 100%;
            justify-content: space-between;
            padding: 20px 10px;
        }
        /* 아케이드 점수판 & 시스템 버튼 상단바 */
        #arcade-header {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }
        #sys-menu {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            width: 100%;
        }
        .sys-btn {
            padding: 6px 14px;
            font-family: 'Malgun Gothic', sans-serif;
            font-size: 13px;
            font-weight: bold;
            color: white;
            background: #334155;
            border: 2px solid #475569;
            border-radius: 8px;
            cursor: pointer;
        }
        .sys-btn:active {
            background: #475569;
        }
        #btn-exit {
            background: #9f1239;
            border-color: #be123c;
        }
        #btn-exit:active {
            background: #e11d48;
        }
        #arcade-hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e293b;
            border: 3px solid #475569;
            width: 100%;
            padding: 10px 25px;
            border-radius: 16px;
            color: #fff;
            font-size: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .hud-player { display: flex; align-items: center; gap: 10px; font-family: 'Malgun Gothic', sans-serif; font-weight: bold;}
        .hud-score { font-size: 36px; color: #ffd700; text-shadow: 0 0 10px #ffd700; font-family: 'Impact', sans-serif; }

        /* 게임 캔버스 */
        canvas {
            background: #0284c7;
            border: 5px solid #fff;
            border-radius: 16px;
            width: 100%;
            aspect-ratio: 2 / 1;
            max-height: 50vh;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }

        /* [3] 아케이드 터치 패드 */
        #pad-container {
            display: flex;
            width: 100%;
            justify-content: space-between;
            padding: 10px;
            margin-bottom: 10px;
        }
        .arrow-group { display: flex; gap: 20px; }
        .pad-btn {
            width: 75px;
            height: 75px;
            background: #334155;
            border: 4px solid #64748b;
            border-radius: 50%;
            color: #fff;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 0 #1e293b;
        }
        .pad-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #1e293b;
            background: #475569;
        }
        .action-group .pad-btn {
            width: 110px;
            border-radius: 20px;
            background: #e11d48;
            border-color: #fb7185;
            font-size: 20px;
            box-shadow: 0 6px 0 #9f1239;
        }
        .action-group .pad-btn:active {
            background: #f43f5e;
            box-shadow: 0 2px 0 #9f1239;
        }
    </style>
</head>
<body>

    <div id="menu-screen">
        <h1>ARCADE BADMINTON</h1>
        <p>원하는 캐릭터를 터치하여 대결을 시작하세요!</p>
        <div class="btn-container">
            <div class="select-btn" id="btn-jiyoon">
                <div class="emoji">👩</div>
                <div class="name">지윤</div>
            </div>
            <div class="select-btn" id="btn-jihoon">
                <div class="emoji">👨</div>
                <div class="name">지훈</div>
            </div>
        </div>
    </div>

    <div id="game-screen">
        <div id="arcade-header">
            <div id="sys-menu">
                <button class="sys-btn" id="btn-pause">⏸ PAUSE</button>
                <button class="sys-btn" id="btn-exit">종료</button>
            </div>
            <div id="arcade-hud">
                <div class="hud-player"><span>👩</span> <span id="name-left">지윤</span></div>
                <div class="hud-score"><span id="score-left">0</span> : <span id="score-right">0</span></div>
                <div class="hud-player"><span id="name-right">지훈</span> <span>👨</span></div>
            </div>
        </div>

        <canvas id="gameCanvas" width="800" height="400"></canvas>

        <div id="pad-container">
            <div class="arrow-group">
                <div class="pad-btn" id="pad-l">◀</div>
                <div class="pad-btn" id="pad-r">▶</div>
            </div>
            <div class="action-group">
                <div class="pad-btn" id="pad-j">JUMP</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // [조정] 아케이드 속도 완화 세팅 데이터
        const JUMP_POWER = -10.5; // 점프 높이 소폭 조절
        const GRAVITY = 0.52;     // 낙하 중력 최적화
        const NET_X = 400;
        const NET_H = 100;

        let leftScore = 0;
        let rightScore = 0;
        let selectedCharacter = 'jiyoon';
        let isPaused = false; // 일시정지 상태 플래그

        const inputs = { left: false, right: false, jump: false };
        let activeSmashLines = []; 

        // 캐릭터 크기 및 물리 모델
        class Character {
            constructor(x, color, emoji, name, isLeft, isAI) {
                this.x = x;
                this.y = 380;
                this.baseY = 380;
                this.radius = 25;
                this.color = color;
                this.emoji = emoji;
                this.name = name;
                this.isLeft = isLeft;
                this.isAI = isAI;
                this.speed = 5.5; // [조정] 기존 7에서 5.5로 이동 속도 완화
                this.vy = 0;
                this.isGrounded = true;
            }

            draw() {
                ctx.save();
                ctx.beginPath();
                ctx.ellipse(this.x, this.baseY, this.radius - (this.baseY - this.y)*0.05, 6, 0, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(0, 0, 0, 0.3)";
                ctx.fill();

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.strokeStyle = "#fff";
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.font = "32px Arial";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(this.emoji, this.x, this.y - 2);

                ctx.font = "14px 'Malgun Gothic'";
                ctx.fillStyle = "#fff";

                ctx.strokeStyle = "#00f2fe";
                ctx.lineWidth = 4;
                ctx.beginPath();
                if (this.isLeft) {
                    ctx.moveTo(this.x + 10, this.y);
                    ctx.lineTo(this.x + 35, this.y - 25);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(this.x + 35, this.y - 25, 12, 0, Math.PI*2);
                } else {
                    ctx.strokeStyle = "#ff007f";
                    ctx.moveTo(this.x - 10, this.y);
                    ctx.lineTo(this.x - 35, this.y - 25);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(this.x - 35, this.y - 25, 12, 0, Math.PI*2);
                }
                ctx.stroke();
                ctx.restore();
            }

            update(ball) {
                if (this.isAI) {
                    let idealX = ball.x;
                    if (this.isLeft && ball.x > NET_X) idealX = 150;
                    if (!this.isLeft && ball.x < NET_X) idealX = 650;

                    // [조정] AI 추적 반응 속도 균형 최적화
                    if (this.x < idealX - 10) this.x += this.speed * 0.8;
                    else if (this.x > idealX + 10) this.x -= this.speed * 0.8;

                    if (this.isGrounded && Math.abs(ball.x - this.x) < 70 && ball.y < 250 && ball.vy > 0) {
                        this.vy = JUMP_POWER;
                        this.isGrounded = false;
                    }
                } else {
                    if (inputs.left) this.x -= this.speed;
                    if (inputs.right) this.x += this.speed;
                    if (inputs.jump && this.isGrounded) {
                        this.vy = JUMP_POWER;
                        this.isGrounded = false;
                        inputs.jump = false;
                    }
                }

                if (!this.isGrounded) {
                    this.vy += GRAVITY;
                    this.y += this.vy;
                    if (this.y >= this.baseY) {
                        this.y = this.baseY;
                        this.vy = 0;
                        this.isGrounded = true;
                    }
                }

                if (this.isLeft) {
                    if (this.x < this.radius) this.x = this.radius;
                    if (this.x > NET_X - this.radius - 5) this.x = NET_X - this.radius - 5;
                } else {
                    if (this.x < NET_X + this.radius + 5) this.x = NET_X + this.radius + 5;
                    if (this.x > canvas.width - this.radius) this.x = canvas.width - this.radius;
                }
            }
        }

        // 아케이드 공 모델
        class ArcadeBall {
            constructor() {
                this.reset(true);
            }

            reset(toLeft) {
                this.x = toLeft ? 200 : 600;
                this.y = 120;
                this.vx = toLeft ? 3.2 : -3.2; // [조정] 기본 수평 발사 속도 하향 다운에 맞춰 감속
                this.vy = -2;
                this.radius = 10;
                this.isSuperStrike = false;
            }

            draw() {
                ctx.save();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.isSuperStrike ? "#fff200" : "#fff";
                ctx.shadowBlur = this.isSuperStrike ? 20 : 5;
                ctx.shadowColor = this.isSuperStrike ? "#ff007f" : "#fff";
                ctx.fill();
                ctx.restore();
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += GRAVITY * 0.65; 

                if (this.y < this.radius) {
                    this.y = this.radius;
                    this.vy = -this.vy * 0.85;
                }

                if (this.y > canvas.height - NET_H && Math.abs(this.x - NET_X) < this.radius + 5) {
                    this.vx = -this.vx * 0.75;
                    this.isSuperStrike = false;
                }

                if (this.y >= canvas.height - this.radius) {
                    if (this.x < NET_X) {
                        rightScore++;
                        document.getElementById("score-right").innerText = rightScore;
                        this.reset(true);
                    } else {
                        leftScore++;
                        document.getElementById("score-left").innerText = leftScore;
                        this.reset(false);
                    }
                }
            }

            hitCheck(player) {
                let targetY = player.y - 15; 
                let dx = this.x - player.x;
                let dy = this.y - targetY;
                let dist = Math.sqrt(dx*dx + dy*dy);

                if (dist < player.radius + this.radius + 20) {
                    // [조정] 타격 전달 속도 계수 감속 매칭
                    this.vx = player.isLeft ? Math.abs(this.vx) + 1.1 : -Math.abs(this.vx) - 1.1;
                    this.vy = -9.2; 

                    if (Math.abs(this.vx) > 11) this.vx = player.isLeft ? 11 : -14;

                    if (!player.isGrounded) {
                        this.isSuperStrike = true;
                        this.vx *= 1.5;
                        this.vy = 10.5; // [조정] 스매시 꽂히는 속도 안정화

                        activeSmashLines.push({
                            sx: this.x, sy: this.y,
                            ex: this.x + this.vx * 2.5, ey: canvas.height,
                            alpha: 1.0
                        });
                    } else {
                        this.isSuperStrike = false;
                    }
                }
            }
        }

        let player1, player2, arcadeBall;

        // 게임 룸 구동 스위치
        function initArcadeGame(choice) {
            selectedCharacter = choice;
            leftScore = 0;
            rightScore = 0;
            document.getElementById("score-left").innerText = "0";
            document.getElementById("score-right").innerText = "0";
            isPaused = false;
            document.getElementById("btn-pause").innerText = "⏸ PAUSE";

            if (choice === 'jiyoon') {
                player1 = new Character(160, "#ffe4e6", "👩", "지윤(유저)", true, false);
                player2 = new Character(640, "#dbeafe", "👨", "지훈(AI)", false, true);
                document.getElementById("name-left").innerText = "지윤(유저)";
                document.getElementById("name-right").innerText = "지훈(AI)";
            } else {
                player1 = new Character(160, "#ffe4e6", "👩", "지윤(AI)", true, true);
                player2 = new Character(640, "#dbeafe", "👨", "지훈(유저)", false, false);
                document.getElementById("name-left").innerText = "지윤(AI)";
                document.getElementById("name-right").innerText = "지훈(유저)";
            }

            arcadeBall = new ArcadeBall();

            document.getElementById("menu-screen").style.display = "none";
            document.getElementById("game-screen").style.display = "flex";

            setupTouchPads();
        }

        // 터치 조작부 바인딩 이벤트 처리
        function setupTouchPads() {
            // 중복 리스너 바인딩 차단을 방지하기 위해 단일 매핑 처리 원칙 준수
            if(window.touchEventsBound) return;
            window.touchEventsBound = true;

            const bind = (id, action) => {
                const target = document.getElementById(id);
                target.addEventListener("touchstart", (e) => { e.preventDefault(); if(!isPaused) inputs[action] = true; });
                target.addEventListener("touchend", (e) => { e.preventDefault(); inputs[action] = false; });
            };
            bind("pad-l", "left");
            bind("pad-r", "right");
            document.getElementById("pad-j").addEventListener("touchstart", (e) => {
                e.preventDefault(); if(!isPaused) inputs.jump = true;
            });
        }

        // 메뉴/상단 시스템 버튼 이벤트 바인딩
        document.getElementById("btn-jiyoon").addEventListener("click", () => initArcadeGame('jiyoon'));
        document.getElementById("btn-jihoon").addEventListener("click", () => initArcadeGame('jihoon'));

        // [기능 추가] PAUSE 제어 시스템 리스너
        document.getElementById("btn-pause").addEventListener("click", () => {
            isPaused = !isPaused;
            if(isPaused) {
                document.getElementById("btn-pause").innerText = "▶ PLAY";
                // 멈췄을 때 키 입력 누락 초기화 조치
                inputs.left = false;
                inputs.right = false;
                inputs.jump = false;
            } else {
                document.getElementById("btn-pause").innerText = "⏸ PAUSE";
            }
        });

        // [기능 추가] 종료 버튼 - 홈 초기 화면 이동 리스너
        document.getElementById("btn-exit").addEventListener("click", () => {
            isPaused = false;
            document.getElementById("game-screen").style.display = "none";
            document.getElementById("menu-screen").style.display = "flex";
        });

        function drawArcadeStage() {
            ctx.fillStyle = "#fff";
            ctx.fillRect(NET_X - 4, canvas.height - NET_H, 8, NET_H);
            ctx.fillStyle = "#ff007f";
            ctx.fillRect(NET_X - 8, canvas.height - NET_H, 16, 8);

            ctx.fillStyle = "#fff";
            ctx.fillRect(0, canvas.height - 6, canvas.width, 6);

            for (let i = activeSmashLines.length - 1; i >= 0; i--) {
                let line = activeSmashLines[i];
                ctx.save();
                ctx.strokeStyle = `rgba(255, 242, 0, ${line.alpha})`;
                ctx.lineWidth = 6;
                ctx.shadowBlur = 15;
                ctx.shadowColor = "#ff7675";
                ctx.beginPath();
                ctx.moveTo(line.sx, line.sy);
                ctx.lineTo(line.ex, line.ey);
                ctx.stroke();
                ctx.restore();

                if(!isPaused) line.alpha -= 0.08; 
                if (line.alpha <= 0) activeSmashLines.splice(i, 1);
            }

            // 일시정지 상태일 때 캔버스 중앙 안내 텍스트 출력
            if(isPaused) {
                ctx.save();
                ctx.fillStyle = "rgba(0, 0, 0, 0.4)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.font = "bold 40px 'Malgun Gothic'";
                ctx.fillStyle = "#ffd700";
                ctx.textAlign = "center";
                ctx.fillText("일시 정지됨", canvas.width / 2, canvas.height / 2);
                ctx.restore();
            }
        }

        // 통합 메인 루프 프레임 런쳐
        function mainLoop() {
            // 일시정지(isPaused)가 아닐 때만 물리적 연산 연동 업데이트 실행
            if (!isPaused && player1 && player2 && arcadeBall) {
                player1.update(arcadeBall);
                player2.update(arcadeBall);
                arcadeBall.update();
                arcadeBall.hitCheck(player1);
                arcadeBall.hitCheck(player2);
            }

            // 그리기 루프는 멈춘 상태 렌더 유지를 위해 매 틱 실행 필수
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawArcadeStage();
            if (player1 && player2 && arcadeBall) {
                player1.draw();
                player2.draw();
                arcadeBall.draw();
            }

            requestAnimationFrame(mainLoop);
        }

        // 글로벌 엔진 루프 스타트
        mainLoop();
    </script>
</body>
</html>
