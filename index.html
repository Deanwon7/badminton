<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arcade Badminton Strike - Championship</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Impact', 'Arial Black', sans-serif;
            overflow: hidden;
        }

        /* [1] 캐릭터 선택 화면 (메인화면) */
        #menu-screen {
            position: relative; 
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            padding: 50px 30px 60px 30px; 
            border-radius: 24px;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.3);
            border: 4px solid #00f2fe;
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        
        .version-tag {
            position: absolute;
            top: 15px;
            right: 20px;
            color: #64748b;
            font-size: 11px;
            font-family: 'Arial', sans-serif;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        #menu-screen h1 {
            color: #00f2fe;
            font-size: 32px;
            margin: 10px 0 10px 0;
            text-shadow: 0 0 10px #00f2fe;
            letter-spacing: 1px;
        }
        #menu-screen p {
            color: #94a3b8;
            font-size: 14px;
            margin: 0 0 30px 0;
            font-family: 'Malgun Gothic', sans-serif;
        }
        .btn-container {
            display: flex;
            gap: 20px;
            width: 100%;
        }
        .select-btn {
            flex: 1;
            background: #334155;
            border: 3px solid #64748b;
            border-radius: 16px;
            padding: 20px 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .select-btn:active {
            transform: scale(0.92);
        }
        #btn-jiyoon { border-color: #f43f5e; box-shadow: 0 0 10px rgba(244,63,94,0.2); }
        #btn-jihoon { border-color: #3b82f6; box-shadow: 0 0 10px rgba(59,130,246,0.2); }
        .select-btn .emoji { font-size: 50px; margin-bottom: 8px; }
        .select-btn .name { color: #fff; font-size: 20px; font-weight: bold; font-family: 'Malgun Gothic'; }

        .creator-tag {
            position: absolute;
            bottom: 15px;
            color: #475569;
            font-size: 12px;
            font-family: 'Arial', sans-serif;
            letter-spacing: 1px;
        }

        /* [2] 게임 화면 래퍼 */
        #game-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 720px;
            height: 100%;
            justify-content: space-between;
            padding: 20px 10px;
        }
        #arcade-header {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
        }
        #sys-menu {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            width: 100%;
        }
        .sys-btn {
            padding: 6px 14px;
            font-family: 'Malgun Gothic', sans-serif;
            font-size: 13px;
            font-weight: bold;
            color: white;
            background: #334155;
            border: 2px solid #475569;
            border-radius: 8px;
            cursor: pointer;
        }
        .sys-btn:active {
            background: #475569;
        }
        #btn-exit {
            background: #9f1239;
            border-color: #be123c;
        }
        #btn-exit:active {
            background: #e11d48;
        }

        /* [🔥 교정 부분] 상단 스코어보드 모바일 최적화 축소 */
        #arcade-hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e293b;
            border: 3px solid #475569;
            width: 100%;
            padding: 6px 15px; /* 패딩 축소 */
            border-radius: 16px;
            color: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .hud-player { 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            font-family: 'Malgun Gothic', sans-serif; 
            font-weight: bold;
            font-size: 14px; /* 이름 글씨 크기 대폭 축소 (기존 24px -> 14px) */
            white-space: nowrap;
        }
        .hud-score { 
            font-size: 26px; /* 스코어 숫자가 밀리지 않게 축소 (기존 36px -> 26px) */
            color: #ffd700; 
            text-shadow: 0 0 8px #ffd700; 
            font-family: 'Impact', sans-serif; 
            padding: 0 10px;
        }

        /* 게임 캔버스 */
        canvas {
            background: #0284c7;
            border: 5px solid #fff;
            border-radius: 16px;
            width: 100%;
            aspect-ratio: 2 / 1;
            max-height: 50vh;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }

        /* [3] 아케이드 터치 패드 */
        #pad-container {
            display: flex;
            width: 100%;
            justify-content: space-between;
            padding: 10px;
            margin-bottom: 10px;
        }
        .arrow-group { display: flex; gap: 20px; }
        .pad-btn {
            width: 75px;
            height: 75px;
            background: #334155;
            border: 4px solid #64748b;
            border-radius: 50%;
            color: #fff;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 0 #1e293b;
        }
        .pad-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #1e293b;
            background: #475569;
        }
        .action-group .pad-btn {
            width: 110px;
            border-radius: 20px;
            background: #e11d48;
            border-color: #fb7185;
            font-size: 20px;
            box-shadow: 0 6px 0 #9f1239;
        }
        .action-group .pad-btn:active {
            background: #f43f5e;
            box-shadow: 0 2px 0 #9f1239;
        }
    </style>
</head>
<body>

    <div id="menu-screen">
        <div class="version-tag">ver 1.0</div> 
        <h1>ARCADE BADMINTON</h1>
        <p>원하는 캐릭터를 터치하여 대결을 시작하세요!</p>
        <div class="btn-container">
            <div class="select-btn" id="btn-jiyoon">
                <div class="emoji">👩</div>
                <div class="name">지윤</div>
            </div>
            <div class="select-btn" id="btn-jihoon">
                <div class="emoji">👨</div>
                <div class="name">지훈</div>
            </div>
        </div>
        <div class="creator-tag">made by Dean</div> 
    </div>

    <div id="game-screen">
        <div id="arcade-header">
            <div id="sys-menu">
                <button class="sys-btn" id="btn-pause">⏸ PAUSE</button>
                <button class="sys-btn" id="btn-exit">종료</button>
            </div>
            <div id="arcade-hud">
                <div class="hud-player"><span>👩</span> <span id="name-left">지윤</span></div>
                <div class="hud-score"><span id="score-left">0</span> : <span id="score-right">0</span></div>
                <div class="hud-player"><span id="name-right">지훈</span> <span>👨</span></div>
            </div>
        </div>

        <canvas id="gameCanvas" width="800" height="400"></canvas>

        <div id="pad-container">
            <div class="arrow-group">
                <div class="pad-btn" id="pad-l">◀</div>
                <div class="pad-btn" id="pad-r">▶</div>
            </div>
            <div class="action-group">
                <div class="pad-btn" id="pad-j">JUMP</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const JUMP_POWER = -13.5; 
        const GRAVITY = 0.52;     
        const NET_X = 400;
        const NET_H = 100;
        const MAX_SCORE = 10;     

        let leftScore = 0;
        let rightScore = 0;
        let selectedCharacter = 'jiyoon';
        let isPaused = false; 
        let isGameOver = false;   
        let winnerName = "";      

        const inputs = { left: false, right: false, jump: false };
        let activeSmashLines = []; 

        class Character {
            constructor(x, color, emoji, name, isLeft, isAI) {
                this.x = x;
                this.y = 380;
                this.baseY = 380;
                this.radius = 25;
                this.color = color;
                this.emoji = emoji;
                this.name = name;
                this.isLeft = isLeft;
                this.isAI = isAI;
                this.speed = 5.5; 
                this.vy = 0;
                this.isGrounded = true;
            }

            draw() {
                ctx.save();
                ctx.beginPath();
                ctx.ellipse(this.x, this.baseY, this.radius - (this.baseY - this.y)*0.05, 6, 0, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(0, 0, 0, 0.3)";
                ctx.fill();

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.strokeStyle = "#fff";
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.font = "32px Arial";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(this.emoji, this.x, this.y - 2);

                ctx.font = "14px 'Malgun Gothic'";
                ctx.fillStyle = "#fff";

                ctx.lineWidth = 4;
                ctx.beginPath();
                if (this.isLeft) {
                    ctx.strokeStyle = "#00f2fe";
                    ctx.moveTo(this.x + 10, this.y);
                    ctx.lineTo(this.x + 35, this.y - 25);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(this.x + 35, this.y - 25, 12, 0, Math.PI*2);
                } else {
                    ctx.strokeStyle = "#ff007f";
                    ctx.moveTo(this.x - 10, this.y);
                    ctx.lineTo(this.x - 35, this.y - 25);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(this.x - 35, this.y - 25, 12, 0, Math.PI*2);
                }
                ctx.stroke();
                ctx.restore();
            }

            update(ball) {
                if (this.isAI) {
                    let idealX = ball.x;
                    if (this.isLeft && ball.x > NET_X) idealX = 150;
                    if (!this.isLeft && ball.x < NET_X) idealX = 650;

                    if (this.x < idealX - 10) this.x += this.speed * 0.8;
                    else if (this.x > idealX + 10) this.x -= this.speed * 0.8;

                    if (this.isGrounded && Math.abs(ball.x - this.x) < 70 && ball.y < 230 && ball.vy > 0) {
                        this.vy = JUMP_POWER;
                        this.isGrounded = false;
                    }
                } else {
                    if (inputs.left) this.x -= this.speed;
                    if (inputs.right) this.x += this.speed;
                    if (inputs.jump && this.isGrounded) {
                        this.vy = JUMP_POWER;
                        this.isGrounded = false;
                        inputs.jump = false;
                    }
                }

                if (!this.isGrounded) {
                    this.vy += GRAVITY;
                    this.y += this.vy;
                    if (this.y >= this.baseY) {
                        this.y = this.baseY;
                        this.vy = 0;
                        this.isGrounded = true;
                    }
                }

                if (this.isLeft) {
                    if (this.x < this.radius) this.x = this.radius;
                    if (this.x > NET_X - this.radius - 5) this.x = NET_X - this.radius - 5;
                } else {
                    if (this.x < NET_X + this.radius + 5) this.x = NET_X + this.radius + 5;
                    if (this.x > canvas.width - this.radius) this.x = canvas.width - this.radius;
                }
            }
        }

        class ArcadeBall {
            constructor() {
                this.reset(true);
            }

            reset(toLeft) {
                this.x = toLeft ? 200 : 600;
                this.y = 120;
                this.vx = toLeft ? 3.2 : -3.2; 
                this.vy = -2;
                this.radius = 10;
                this.isSuperStrike = false;
            }

            draw() {
                ctx.save();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.isSuperStrike ? "#fff200" : "#fff";
                ctx.shadowBlur = this.isSuperStrike ? 20 : 5;
                ctx.shadowColor = this.isSuperStrike ? "#ff007f" : "#fff";
                ctx.fill();
                ctx.restore();
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += GRAVITY * 0.65; 

                if (this.y < this.radius) {
                    this.y = this.radius;
                    this.vy = -this.vy * 0.85;
                }

                if (this.y > canvas.height - NET_H && Math.abs(this.x - NET_X) < this.radius + 5) {
                    this.vx = -this.vx * 0.75;
                    this.isSuperStrike = false;
                }

                if (this.y >= canvas.height - this.radius) {
                    if (this.x < NET_X) {
                        rightScore++;
                        document.getElementById("score-right").innerText = rightScore;
                        checkMatchPoint(); 
                        if(!isGameOver) this.reset(true);
                    } else {
                        leftScore++;
                        document.getElementById("score-left").innerText = leftScore;
                        checkMatchPoint(); 
                        if(!isGameOver) this.reset(false);
                    }
                }
            }

            hitCheck(player) {
                let targetY = player.y - 15; 
                let dx = this.x - player.x;
                let dy = this.y - targetY;
                let dist = Math.sqrt(dx*dx + dy*dy);

                if (dist < player.radius + this.radius + 20) {
                    this.vx = player.isLeft ? Math.abs(this.vx) + 1.1 : -Math.abs(this.vx) - 1.1;
                    this.vy = -9.2; 

                    if (Math.abs(this.vx) > 11) this.vx = player.isLeft ? 11 : -14;

                    if (!player.isGrounded) {
                        this.isSuperStrike = true;
                        this.vx *= 1.5;
                        this.vy = 10.5; 

                        activeSmashLines.push({
                            sx: this.x, sy: this.y,
                            ex: this.x + this.vx * 2.5, ey: canvas.height,
                            alpha: 1.0
                        });
                    } else {
                        this.isSuperStrike = false;
                    }
                }
            }
        }

        let player1, player2, arcadeBall;

        function checkMatchPoint() {
            if (leftScore >= MAX_SCORE) {
                isGameOver = true;
                winnerName = player1.isAI ? "지윤(AI)" : "지윤(유저)";
                triggerExitTimer();
            } else if (rightScore >= MAX_SCORE) {
                isGameOver = true;
                winnerName = player2.isAI ? "지훈(AI)" : "지훈(유저)";
                triggerExitTimer();
            }
        }

        function triggerExitTimer() {
            setTimeout(() => {
                resetToMenu();
            }, 8000); 
        }

        function resetToMenu() {
            isPaused = false;
            isGameOver = false;
            document.getElementById("game-screen").style.display = "none";
            document.getElementById("menu-screen").style.display = "flex";
        }

        function initArcadeGame(choice) {
            selectedCharacter = choice;
            leftScore = 0;
            rightScore = 0;
            isGameOver = false;
            document.getElementById("score-left").innerText = "0";
            document.getElementById("score-right").innerText = "0";
            isPaused = false;
            document.getElementById("btn-pause").innerText = "⏸ PAUSE";

            if (choice === 'jiyoon') {
                player1 = new Character(160, "#ffe4e6", "👩", "지윤", true, false);
                player2 = new Character(640, "#dbeafe", "👨", "지훈", false, true);
                document.getElementById("name-left").innerText = "지윤(유저)";
                document.getElementById("name-right").innerText = "지훈(AI)";
            } else {
                player1 = new Character(160, "#ffe4e6", "👩", "지윤", true, true);
                player2 = new Character(640, "#dbeafe", "👨", "지훈", false, false);
                document.getElementById("name-left").innerText = "지윤(AI)";
                document.getElementById("name-right").innerText = "지훈(유저)";
            }

            arcadeBall = new ArcadeBall();

            document.getElementById("menu-screen").style.display = "none";
            document.getElementById("game-screen").style.display = "flex";

            setupTouchPads();
        }

        function setupTouchPads() {
            if(window.touchEventsBound) return;
            window.touchEventsBound = true;

            const bind = (id, action) => {
                const target = document.getElementById(id);
                target.addEventListener("touchstart", (e) => { e.preventDefault(); if(!isPaused && !isGameOver) inputs[action] = true; });
                target.addEventListener("touchend", (e) => { e.preventDefault(); inputs[action] = false; });
            };
            bind("pad-l", "left");
            bind("pad-r", "right");
            document.getElementById("pad-j").addEventListener("touchstart", (e) => {
                e.preventDefault(); if(!isPaused && !isGameOver) inputs.jump = true;
            });
        }

        document.getElementById("btn-jiyoon").addEventListener("click", () => initArcadeGame('jiyoon'));
        document.getElementById("btn-jihoon").addEventListener("click", () => initArcadeGame('jihoon'));

        document.getElementById("btn-pause").addEventListener("click", () => {
            if (isGameOver) return; 
            isPaused = !isPaused;
            if(isPaused) {
                document.getElementById("btn-pause").innerText = "▶ PLAY";
                inputs.left = false; inputs.right = false; inputs.jump = false;
            } else {
                document.getElementById("btn-pause").innerText = "⏸ PAUSE";
            }
        });

        document.getElementById("btn-exit").addEventListener("click", () => {
            resetToMenu();
        });

        function drawArcadeStage() {
            ctx.fillStyle = "#fff";
            ctx.fillRect(NET_X - 4, canvas.height - NET_H, 8, NET_H);
            ctx.fillStyle = "#ff007f";
            ctx.fillRect(NET_X - 8, canvas.height - NET_H, 16, 8);

            ctx.fillStyle = "#fff";
            ctx.fillRect(0, canvas.height - 6, canvas.width, 6);

            for (let i = activeSmashLines.length - 1; i >= 0; i--) {
                let line = activeSmashLines[i];
                ctx.save();
                ctx.strokeStyle = `rgba(255, 242, 0, ${line.alpha})`;
                ctx.lineWidth = 6;
                ctx.shadowBlur = 15;
                ctx.shadowColor = "#ff7675";
                ctx.beginPath();
                ctx.moveTo(line.sx, line.sy);
                ctx.lineTo(line.ex, line.ey);
                ctx.stroke();
                ctx.restore();

                if(!isPaused && !isGameOver) line.alpha -= 0.08; 
                if (line.alpha <= 0) activeSmashLines.splice(i, 1);
            }

            if(isPaused) {
                ctx.save();
                ctx.fillStyle = "rgba(0, 0, 0, 0.4)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.font = "bold 40px 'Malgun Gothic'";
                ctx.fillStyle = "#ffd700";
                ctx.textAlign = "center";
                ctx.fillText("일시 정지됨", canvas.width / 2, canvas.height / 2);
                ctx.restore();
            }

            if(isGameOver) {
                ctx.save();
                ctx.fillStyle = "rgba(15, 23, 42, 0.94)"; 
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // 타이틀 축소 개정 (36px -> 28px)
                ctx.font = "bold 28px 'Malgun Gothic'";
                ctx.fillStyle = "#00f2fe";
                ctx.textAlign = "center";
                ctx.shadowBlur = 12;
                ctx.shadowColor = "#00f2fe";
                ctx.fillText("경기 종료 (MATCH OVER)", canvas.width / 2, canvas.height / 2 - 30);
                
                // 안내 텍스트 컴팩트화 축소 (24px -> 18px)
                ctx.font = "bold 18px 'Malgun Gothic'";
                ctx.fillStyle = "#ffd700";
                ctx.shadowBlur = 6;
                ctx.shadowColor = "#ffd700";
                ctx.fillText(`🏆 승리자: ${winnerName} [ ${leftScore} : ${rightScore} ] 🏆`, canvas.width / 2, canvas.height / 2 + 15);
                
                ctx.font = "12px 'Malgun Gothic'";
                ctx.fillStyle = "#94a3b8";
                ctx.shadowBlur = 0;
                ctx.fillText("잠시 후 메인 화면으로 이동합니다...", canvas.width / 2, canvas.height / 2 + 60);
                ctx.restore();
            }
        }

        function mainLoop() {
            if (!isPaused && !isGameOver && player1 && player2 && arcadeBall) {
                player1.update(arcadeBall);
                player2.update(arcadeBall);
                arcadeBall.update();
                arcadeBall.hitCheck(player1);
                arcadeBall.hitCheck(player2);
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawArcadeStage();
            
            if (!isGameOver && player1 && player2 && arcadeBall) {
                player1.draw();
                player2.draw();
                arcadeBall.draw(); 
            }

            requestAnimationFrame(mainLoop);
        }

        mainLoop();
    </script>
</body>
</html>
